<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة موسوعة المعدات | لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main-color: #00a884; --med-dark: #1e3a8a; --surgical-red: #be123c; --bg-color: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-color); padding: 20px; direction: rtl; margin: 0; }
        
        .admin-card { background: white; max-width: 900px; margin: 0 auto; padding: 40px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); border-top: 8px solid var(--med-dark); animation: fadeIn 0.5s ease; }
        h2 { color: var(--med-dark); text-align: center; margin-bottom: 25px; font-weight: 900; font-size: 2rem; }
        
        .form-section { background: #ffffff; padding: 25px; border-radius: 20px; margin-bottom: 25px; border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0,0,0,0.02); display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-section label { font-weight: bold; margin-bottom: 8px; color: #334155; display: block; }
        .form-section .full-width { grid-column: 1 / -1; }
        
        input, select, textarea { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-family: 'Cairo'; box-sizing: border-box; outline: none; transition: 0.3s; font-size: 1rem; background: #f8fafc; }
        input:focus, select:focus, textarea:focus { border-color: var(--med-dark); background: white; box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1); }
        
        .btn-main { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--med-dark), #334155); color: white; border: none; border-radius: 15px; font-size: 1.3rem; font-weight: bold; cursor: pointer; transition: 0.4s; box-shadow: 0 10px 25px rgba(30, 58, 138, 0.3); }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(30, 58, 138, 0.4); }
        
        .data-list { margin-top: 40px; border-top: 2px dashed #cbd5e0; padding-top: 30px; }
        .data-item { background: white; border: 1px solid #e2e8f0; padding: 20px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: 0.3s; border-right: 5px solid var(--surgical-red); }
        .data-item:hover { transform: translateX(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.05); }
        .data-item img { width: 50px; height: 50px; object-fit: contain; border-radius: 8px; border: 1px solid #eee; margin-left: 15px; }
        
        .action-btns { display: flex; gap: 10px; }
        .btn-edit { background: #e0f2fe; color: #0284c7; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; transition: 0.3s; }
        .btn-delete { background: #fee2e2; color: #ef4444; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; transition: 0.3s; }
        
        /* شاشة الدخول */
        #loginSection { max-width: 450px; margin: 10vh auto; background: white; padding: 50px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; border-top: 8px solid var(--med-dark); }
        #adminPanel { display: none; }
        .logout-link { display: block; text-align: center; margin-top: 30px; color: #ef4444; cursor: pointer; font-weight: bold; font-size: 1.1rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .form-section { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="loginSection">
    <i class="fas fa-tools" style="font-size: 5rem; color: var(--med-dark); margin-bottom: 20px;"></i>
    <h2>إدارة موسوعة المعدات</h2>
    <p style="color: #64748b; margin-bottom: 30px;">سجل دخولك لإضافة وتعديل الأدوات الجراحية</p>
    
    <select id="userName" style="margin-bottom: 20px;">
        <option value="">-- اختر المستخدم --</option>
        <option value="admin">المدير العام</option>
        <option value="user2">الممرض الرشيد</option>
    </select>

    <input type="password" id="adminPass" placeholder="كلمة المرور السرية" style="margin-bottom: 25px;">
    <button class="btn-main" onclick="verifyAccess()">دخول اللوحة <i class="fas fa-sign-in-alt"></i></button>
    <p id="loginError" style="color: #ef4444; display: none; margin-top: 15px; font-weight: bold;">بيانات الدخول غير صحيحة!</p>
</div>

<div id="adminPanel">
    <div class="admin-card">
        <h2><i class="fas fa-microscope" style="color: var(--surgical-red);"></i> تحكم موسوعة المعدات الجراحية</h2>
        
        <div class="form-section">
            <div>
                <label>اسم الأداة (بالعربي)</label>
                <input type="text" id="eqNameAr" placeholder="مثلاً: المشرط الجراحي">
            </div>
            
            <div>
                <label>اسم الأداة (بالإنجليزي)</label>
                <input type="text" id="eqNameEn" placeholder="مثلاً: Surgical Scalpel">
            </div>

            <div>
                <label>التصنيف</label>
                <select id="eqCat">
                    <option value="جراحة">أدوات جراحية</option>
                    <option value="طوارئ">طوارئ</option>
                    <option value="عناية مكثفة">عناية مكثفة</option>
                    <option value="أخرى">أخرى</option>
                </select>
            </div>

            <div>
                <label>رابط صورة الأداة</label>
                <input type="url" id="eqImage" placeholder="رابط مباشر للصورة (http://...)">
            </div>

            <div class="full-width">
                <label>الوصف السريري (الاستخدام)</label>
                <textarea id="eqUsage" rows="2" placeholder="فيم تستخدم هذه الأداة؟"></textarea>
            </div>

            <div class="full-width">
                <label>طريقة الاستخدام المهني</label>
                <textarea id="eqHowTo" rows="3" placeholder="كيفية الإمساك بها والتعامل معها..."></textarea>
            </div>

            <div class="full-width">
                <label>الأنواع والقياسات (افصل بينها بفاصلة , )</label>
                <input type="text" id="eqTypes" placeholder="مثلاً: شفرة 10, شفرة 11, مستقيم, منحني">
            </div>
        </div>

        <button class="btn-main" id="mainSubmitBtn" onclick="saveEquipment()">إضافة للموسوعة <i class="fas fa-plus-circle"></i></button>
        
        <div class="data-list">
            <h3 style="color: var(--med-dark); margin-bottom: 20px;"><i class="fas fa-list"></i> الأدوات المسجلة حالياً:</h3>
            <div id="activeEqList">
                <div style="text-align: center; color: #94a3b8;"><i class="fas fa-spinner fa-spin"></i> جاري جلب البيانات...</div>
            </div>
        </div>
        
        <span class="logout-link" onclick="location.reload()"><i class="fas fa-power-off"></i> تسجيل الخروج</span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBltsN_YuPhicWCv4MmbYf7-kSp9u66lBE",
        authDomain: "sudanse-nursing-network.firebaseapp.com",
        projectId: "sudanse-nursing-network",
        storageBucket: "sudanse-nursing-network.firebasestorage.app",
        messagingSenderId: "577008528931",
        appId: "1:577008528931:web:febfbc9ce086a07b8ccb96"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const usersList = { "admin": "0960", "user2": "096020" };
    window.verifyAccess = function() {
        const user = document.getElementById('userName').value;
        const pass = document.getElementById('adminPass').value;
        if (user && usersList[user] === pass) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    let currentEditKey = null;
    window.eqDataMap = {};

    window.saveEquipment = function() {
        const nameAr = document.getElementById('eqNameAr').value;
        const nameEn = document.getElementById('eqNameEn').value;
        const cat = document.getElementById('eqCat').value;
        const image = document.getElementById('eqImage').value || 'https://via.placeholder.com/300x200/ffffff/000000?text=No+Image';
        const usage = document.getElementById('eqUsage').value;
        const howTo = document.getElementById('eqHowTo').value;
        const typesStr = document.getElementById('eqTypes').value;

        if (!nameAr || !nameEn || !usage) return alert("الرجاء ملء البيانات الأساسية (الاسم والوصف)!");

        const typesArray = typesStr.split(',').map(s => s.trim()).filter(s => s !== "");

        const eqObject = { nameAr, nameEn, cat, image, usage, howTo, types: typesArray, timestamp: Date.now() };

        if (currentEditKey) {
            update(ref(db, 'equipment_wiki/' + currentEditKey), eqObject).then(() => {
                alert("✅ تم تعديل الأداة بنجاح!");
                resetForm();
            });
        } else {
            push(ref(db, 'equipment_wiki'), eqObject).then(() => {
                alert("✅ تمت الإضافة للموسوعة بنجاح!");
                resetForm();
            });
        }
    }

    function resetForm() {
        document.getElementById('eqNameAr').value = "";
        document.getElementById('eqNameEn').value = "";
        document.getElementById('eqCat').value = "جراحة";
        document.getElementById('eqImage').value = "";
        document.getElementById('eqUsage').value = "";
        document.getElementById('eqHowTo').value = "";
        document.getElementById('eqTypes').value = "";
        
        currentEditKey = null;
        const btn = document.getElementById('mainSubmitBtn');
        btn.innerHTML = 'إضافة للموسوعة <i class="fas fa-plus-circle"></i>';
        btn.style.background = 'linear-gradient(135deg, var(--med-dark), #334155)';
    }

    onValue(ref(db, 'equipment_wiki'), (snapshot) => {
        const list = document.getElementById('activeEqList');
        list.innerHTML = '';
        window.eqDataMap = {};
        
        if (!snapshot.exists()) { list.innerHTML = "<p style='text-align:center;'>لا توجد معدات مسجلة حالياً.</p>"; return; }

        snapshot.forEach(child => {
            const data = child.val();
            window.eqDataMap[child.key] = data;
            
            list.innerHTML += `
                <div class="data-item">
                    <div style="display:flex; align-items:center;">
                        <img src="${data.image}" alt="img">
                        <div style="margin-right:15px;">
                            <strong style="color: var(--med-dark); font-size: 1.1rem; display:block;">${data.nameAr}</strong> 
                            <span style="color: #64748b; font-size: 0.9rem;">${data.nameEn} - (${data.cat})</span>
                        </div>
                    </div>
                    <div class="action-btns">
                        <button class="btn-edit" onclick="prepareEdit('${child.key}')"><i class="fas fa-edit"></i></button>
                        <button class="btn-delete" onclick="deleteEq('${child.key}')"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
        });
    });

    window.deleteEq = function(key) {
        if(confirm("متأكد من حذف هذه الأداة من الموسوعة؟")) remove(ref(db, 'equipment_wiki/' + key));
    }

    window.prepareEdit = function(key) {
        const data = window.eqDataMap[key];
        if(!data) return;
        
        document.getElementById('eqNameAr').value = data.nameAr || "";
        document.getElementById('eqNameEn').value = data.nameEn || "";
        document.getElementById('eqCat').value = data.cat || "جراحة";
        document.getElementById('eqImage').value = data.image || "";
        document.getElementById('eqUsage').value = data.usage || "";
        document.getElementById('eqHowTo').value = data.howTo || "";
        document.getElementById('eqTypes').value = data.types ? data.types.join(', ') : "";
        
        currentEditKey = key;
        const btn = document.getElementById('mainSubmitBtn');
        btn.innerHTML = 'حفظ التعديلات <i class="fas fa-save"></i>';
        btn.style.background = 'linear-gradient(135deg, #0284c7, #0369a1)';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
