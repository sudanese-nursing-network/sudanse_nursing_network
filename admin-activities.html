<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة نبض الميدان | لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* التنسيقات الأصلية الخاصة بك كما هي تماماً بدون حذف أي حرف */
        :root { --deep-green: #064e3b; --primary-gold: #c29d0b; }
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7f6; padding: 20px; direction: rtl; }
        .admin-card { background: white; max-width: 700px; margin: 0 auto; padding: 35px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 8px solid var(--deep-green); }
        h2 { color: var(--deep-green); text-align: center; margin-bottom: 25px; font-weight: 900; }
        .form-section { background: #f8fafc; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #334155; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 12px; font-family: 'Cairo'; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary-gold); }
        .btn-publish { width: 100%; padding: 18px; background: linear-gradient(45deg, var(--deep-green), #0a5f49); color: white; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-publish:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(6,78,59,0.3); }
        .act-list { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .act-item { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { background: #fee2e2; color: #ef4444; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* --- الإضافات الجديدة الخاصة بشاشة الدخول وزر التعديل (لحفظ الأمان والتنسيق) --- */
        #loginSection { max-width: 420px; margin: 80px auto; background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); text-align: center; border-top: 8px solid var(--deep-green); }
        #adminPanel { display: none; /* هذا السطر يخفي اللوحة حتى يتم تسجيل الدخول */ }
        .user-select { margin-bottom: 15px; border: 2px solid #ddd; outline: none; }
        .user-select:focus { border-color: var(--primary-gold); }
        .logout-link { display: block; text-align: center; margin-top: 25px; color: var(--deep-green); cursor: pointer; font-weight: bold; text-decoration: underline; transition: 0.3s; }
        .logout-link:hover { color: var(--primary-gold); }
        .action-btns { display: flex; gap: 8px; }
        .btn-edit { background: #fef08a; color: #854d0e; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-edit:hover { background: #fde047; }
    </style>
</head>
<body>

<div id="loginSection">
    <i class="fas fa-camera-retro" style="font-size: 4rem; color: var(--deep-green); margin-bottom: 20px;"></i>
    <h2 style="color: var(--deep-green); font-weight: 900;">إدارة نبض الميدان</h2>
    <p style="color: #334155; margin-bottom: 25px;">اختر حسابك وأدخل كلمة السر للتحكم بالنشاطات</p>
    
    <select id="userName" class="user-select" style="width: 100%; padding: 14px; border-radius: 12px; font-family: 'Cairo';">
        <option value="">-- اختر المستخدم --</option>
        <option value="admin">إدارة الشبكة</option>
        <option value="user1">مسؤول الإعلام</option>
        <option value="user2">الممرض الرشيد</option>
    </select>

    <input type="password" id="adminPass" placeholder="كلمة المرور السرية" style="width: 100%; padding: 14px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 12px; font-family: 'Cairo'; box-sizing: border-box; outline: none;">
    <button class="btn-publish" onclick="verifyAccess()">فتح اللوحة الآمنة</button>
    <p id="loginError" style="color: #ef4444; display: none; margin-top: 15px; font-weight: bold;">بيانات الدخول غير صحيحة!</p>
</div>

<div id="adminPanel">
    
    <div class="admin-card">
        <h2><i class="fas fa-camera-retro"></i> إدارة نبض الميدان</h2>
        
        <div class="form-section">
            <label>عنوان النشاط</label>
            <input type="text" id="actTitle" placeholder="مثلاً: المشاركة في اليوم العالمي للتمريض">
            
            <label>نوع النشاط</label>
            <select id="actTag">
                <option value="ميداني">نشاط ميداني</option>
                <option value="إنجاز">إنجاز جديد</option>
                <option value="تطوعي">عمل تطوعي</option>
                <option value="رقمي">نشاط رقمي</option>
            </select>

            <label>تاريخ النشاط</label>
            <input type="text" id="actDate" placeholder="مثلاً: 12 مايو 2025">

            <label>رابط صورة النشاط (URL)</label>
            <input type="text" id="actImg" placeholder="ضع رابط الصورة هنا">

            <label>وصف النشاط</label>
            <textarea id="actDesc" rows="4" placeholder="اكتب تفاصيل النشاط هنا..."></textarea>

            <label>كتاب الزوار (تعليقات مميزة)</label>
            <input type="text" id="actGuest" placeholder="مثلاً: د.سارة: فخورين بيكم | م.أحمد: جامعة دنقلا..">
        </div>

        <button class="btn-publish" id="mainSubmitBtn" onclick="pushActivity()">نشر النشاط في الميدان الآن <i class="fas fa-upload"></i></button>
        
        <div class="act-list">
            <h3>النشاطات الموثقة حالياً:</h3>
            <div id="activeActs"></div>
        </div>
        
        <span class="logout-link" onclick="location.reload()"><i class="fas fa-lock"></i> تسجيل الخروج وإقفال اللوحة</span>
    </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBltsN_YuPhicWCv4MmbYf7-kSp9u66lBE",
        authDomain: "sudanse-nursing-network.firebaseapp.com",
        databaseURL: "https://sudanse-nursing-network-default-rtdb.firebaseio.com/",
        projectId: "sudanse-nursing-network",
        storageBucket: "sudanse-nursing-network.firebasestorage.app",
        messagingSenderId: "577008528931",
        appId: "1:577008528931:web:febfbc9ce086a07b8ccb96"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // === الكود الجديد المسؤول عن تسجيل الدخول والحماية ===
    const usersList = {
        "admin": "0960",   
        "user1": "Media123",      
        "user2": "096020"       // كلمة السر الخاصة بك
    };

    function verifyAccess() {
        const user = document.getElementById('userName').value;
        const pass = document.getElementById('adminPass').value;
        const errorMsg = document.getElementById('loginError');

        if (user && usersList[user] === pass) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
        } else {
            errorMsg.style.display = 'block';
            document.getElementById('adminPass').value = "";
        }
    }

    // === متغيرات التحكم بالتعديل ===
    let currentEditKey = null;
    window.actDataMap = {}; // تخزين البيانات محلياً للتعديل

    // === الكود البرمجي الأصلي الخاص بك موجود بالكامل مع إضافة خيار التعديل ===
    function pushActivity() {
        const title = document.getElementById('actTitle').value;
        const tag = document.getElementById('actTag').value;
        const date = document.getElementById('actDate').value;
        const img = document.getElementById('actImg').value || "network_bg.jpg";
        const desc = document.getElementById('actDesc').value;
        const guest = document.getElementById('actGuest').value;

        if (!title || !desc) return alert("يا الرشيد، املأ العنوان والوصف!");

        if (currentEditKey) {
            // تحديث النشاط الموجود
            database.ref('activities/' + currentEditKey).update({
                title, tag, date, img, desc, guest,
                timestamp: Date.now()
            }).then(() => {
                alert("✅ تم تعديل وتحديث النشاط بنجاح!");
                resetForm();
            });
        } else {
            // الكود الأصلي (إضافة نشاط جديد) بدون أي حذف
            const newActRef = database.ref('activities').push();
            newActRef.set({
                title, tag, date, img, desc, guest,
                timestamp: Date.now()
            }).then(() => {
                alert("✅ تم توثيق النشاط بنجاح!");
                resetForm();
            });
        }
    }

    // دالة لتفريغ الخانات وإرجاع الزر لشكله الأصلي
    function resetForm() {
        document.getElementById('actTitle').value = "";
        document.getElementById('actDesc').value = "";
        document.getElementById('actTag').value = "ميداني";
        document.getElementById('actDate').value = "";
        document.getElementById('actImg').value = "";
        document.getElementById('actGuest').value = "";
        
        currentEditKey = null;
        
        const btn = document.getElementById('mainSubmitBtn');
        btn.innerHTML = 'نشر النشاط في الميدان الآن <i class="fas fa-upload"></i>';
        btn.style.background = 'linear-gradient(45deg, var(--deep-green), #0a5f49)';
    }

    database.ref('activities').on('value', (snapshot) => {
        const list = document.getElementById('activeActs');
        list.innerHTML = '';
        window.actDataMap = {}; // تفريغ الذاكرة
        
        snapshot.forEach(child => {
            const data = child.val();
            window.actDataMap[child.key] = data; // حفظ البيانات لزر التعديل
            
            // الكود الأصلي مع إضافة زر التعديل بجانب زر الحذف
            list.innerHTML += `
                <div class="act-item">
                    <span><strong>${data.title}</strong> (${data.date})</span>
                    <div class="action-btns">
                        <button class="btn-edit" onclick="prepareEdit('${child.key}')"><i class="fas fa-edit"></i> تعديل</button>
                        <button class="btn-delete" onclick="deleteAct('${child.key}')">حذف</button>
                    </div>
                </div>`;
        });
    });

    function deleteAct(key) {
        if(confirm("هل تريد حذف هذا التوثيق نهائياً؟")) database.ref('activities/' + key).remove();
    }

    // === دالة جديدة تقوم بسحب البيانات للخانات عند ضغط زر التعديل ===
    function prepareEdit(key) {
        const data = window.actDataMap[key];
        if(!data) return;
        
        document.getElementById('actTitle').value = data.title || "";
        document.getElementById('actTag').value = data.tag || "ميداني";
        document.getElementById('actDate').value = data.date || "";
        // إذا كانت الصورة هي الافتراضية، اترك الخانة فارغة، وإلا ضع الرابط
        document.getElementById('actImg').value = (data.img && data.img !== "network_bg.jpg") ? data.img : "";
        document.getElementById('actDesc').value = data.desc || "";
        document.getElementById('actGuest').value = data.guest || "";
        
        currentEditKey = key;
        
        // تغيير شكل الزر لتنبيه المستخدم أنه يقوم بتعديل وليس إضافة
        const btn = document.getElementById('mainSubmitBtn');
        btn.innerHTML = 'حفظ التعديلات 💾';
        btn.style.background = 'linear-gradient(45deg, var(--primary-gold), #854d0e)'; // اللون الذهبي
        
        // الصعود لأعلى الشاشة تلقائياً
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
